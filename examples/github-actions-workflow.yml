name: SportMind Intelligence Briefing

on:
  schedule:
    - cron: "0 7 * * 1"   # Weekly — Monday 07:00 UTC
    # - cron: "0 7 * * *" # Daily — uncomment to enable daily fan token alerts

  workflow_dispatch:
    inputs:
      sources:
        description: "Source categories (comma-separated, or 'all')"
        required: false
        default: "all"
      min_tier:
        description: "Minimum tier to include (1, 2, or 3)"
        required: false
        default: "2"
      dry_run:
        description: "Dry run — no delivery"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.11"

jobs:
  full-briefing:
    name: Full Intelligence Briefing
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && contains(github.event.schedule, '* * 1'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run intelligence agent
        env:
          SPORTMIND_GH_TOKEN: ${{ secrets.SPORTMIND_GH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          COINGECKO_API_KEY:  ${{ secrets.COINGECKO_API_KEY }}
          CMC_API_KEY:        ${{ secrets.CMC_API_KEY }}
        run: |
          python agent/run.py \
            --sources ${{ github.event.inputs.sources || 'all' }} \
            --min-tier ${{ github.event.inputs.min_tier || '2' }} \
            --output github-issue \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

# ─────────────────────────────────────────────────────────
# SECRETS — Settings → Secrets and variables → Actions
#
# REQUIRED:
#   SPORTMIND_GH_TOKEN    GitHub PAT, Issues:write on SportMind/SportMind
#
# OPTIONAL — Telegram:
#   TELEGRAM_BOT_TOKEN    Bot token from @BotFather
#   TELEGRAM_CHAT_ID      Channel/group chat ID
#
# OPTIONAL — Email:
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASSWORD
#   EMAIL_FROM / EMAIL_TO
#
# OPTIONAL — API keys:
#   COINGECKO_API_KEY     Raises CoinGecko rate limits
#   CMC_API_KEY           CoinMarketCap free tier
#
# See briefing/delivery-options.md for full setup instructions.
# ─────────────────────────────────────────────────────────
